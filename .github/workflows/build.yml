name: Build Minecraft (Windows + Linux)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install MinGW
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64
    
    - name: Download raylib
      run: |
        wget https://github.com/raysan5/raylib/releases/download/4.5.0/raylib-4.5.0_win64_mingw-w64.zip
        unzip raylib-4.5.0_win64_mingw-w64.zip
    
    - name: Build for Windows
      run: |
        x86_64-w64-mingw32-g++ -o minecraft.exe minecraft.cpp \
          -I./raylib-4.5.0_win64_mingw-w64/include \
          -L./raylib-4.5.0_win64_mingw-w64/lib \
          -lraylib -lopengl32 -lgdi32 -lwinmm -static
    
    - name: Upload Windows EXE
      uses: actions/upload-artifact@v4
      with:
        name: minecraft-windows
        path: minecraft.exe

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglfw3-dev libgl1-mesa-dev libxi-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev
    
    - name: Install raylib
      run: |
        git clone https://github.com/raysan5/raylib.git
        cd raylib
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)
        sudo make install
    
    - name: Build for Linux
      run: |
        g++ -o minecraft-linux minecraft.cpp -lraylib -lm -lglfw -lGL -lX11 -lpthread -ldl -lrt
    
    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: minecraft-linux
        path: minecraft-linux
