name: Build Minecraft (Windows + Linux)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [win32, win64]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 mingw-w64-tools
    
    - name: Download raylib source
      run: |
        git clone https://github.com/raysan5/raylib.git
        cd raylib
        git checkout 4.5.0
    
    - name: Build raylib for Windows
      run: |
        cd raylib/src
        if [ "${{ matrix.platform }}" = "win32" ]; then
          make PLATFORM=PLATFORM_DESKTOP RAYLIB_LIBTYPE=STATIC CC=i686-w64-mingw32-gcc
        else
          make PLATFORM=PLATFORM_DESKTOP RAYLIB_LIBTYPE=STATIC CC=x86_64-w64-mingw32-gcc
        fi
    
    - name: Build game for Windows
      run: |
        if [ "${{ matrix.platform }}" = "win32" ]; then
          i686-w64-mingw32-gcc -o minecraft.exe minecraft.c -I./raylib/src -L./raylib/src -lraylib -lm -lopengl32 -lgdi32 -lwinmm -static
        else
          x86_64-w64-mingw32-gcc -o minecraft.exe minecraft.c -I./raylib/src -L./raylib/src -lraylib -lm -lopengl32 -lgdi32 -lwinmm -static
        fi
    
    - name: Upload Windows EXE
      uses: actions/upload-artifact@v4
      with:
        name: minecraft-windows-${{ matrix.platform }}
        path: minecraft.exe

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglfw3-dev libgl1-mesa-dev libxi-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev
    
    - name: Install raylib
      run: |
        git clone https://github.com/raysan5/raylib.git
        cd raylib
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)
        sudo make install
    
    - name: Build for Linux
      run: |
        gcc -o minecraft-linux minecraft.c -lraylib -lm -lglfw -lGL -lX11 -lpthread -ldl -lrt
    
    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: minecraft-linux
        path: minecraft-linux
