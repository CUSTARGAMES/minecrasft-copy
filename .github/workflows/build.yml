name: Build Minecraft

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglfw3-dev libgl1-mesa-dev libxi-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev
    
    - name: Install raylib
      run: |
        git clone https://github.com/raysan5/raylib.git
        cd raylib
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)
        sudo make install
    
    - name: Build
      run: |
        gcc -o minecraft minecraft.c -lraylib -lm -lglfw -lGL -lX11 -lpthread -ldl -lrt
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: minecraft-linux
        path: minecraft
